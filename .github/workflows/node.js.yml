# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
      env:
        VITE_API_URL: ${{ vars.VITE_API_URL }}
    - run: npm test --if-present

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Solo ejecutaremos el despliegue si estamos haciendo push a la rama main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          script: |
            # 1. Configurar variables de entorno y cargar NVM/Node
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              source "$NVM_DIR/nvm.sh"
              nvm use default || nvm use node || true
            fi
            
            # Asegurar rutas comunes
            export PATH="$PATH:/usr/local/bin:/usr/bin:/bin:$HOME/.nvm/versions/node/$(nvm current 2>/dev/null)/bin"
            
            # 2. Navegar al proyecto o crearlo
            PROJECT_DIR="/var/www/clients/client11/web16/web/myrentta-app"
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"
            
            # 3. Configurar SSH para GitHub
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
            
            # 4. Configurar Git y SSH Command
            # Aseguramos que git use siempre la llave de despliegue específica
            if [ ! -d ".git" ]; then
              echo "Inicializando repositorio git..."
              git init
              git remote add origin git@github.com:rdavid87/myrentta-app.git
            fi
            
            git config core.sshCommand "ssh -i ~/.ssh/github_deploy_key -o IdentitiesOnly=yes"
            
            # 5. Sincronizar con GitHub
            # IMPORTANTE: ~/.ssh/github_deploy_key debe existir en el VPS y estar en las Deploy Keys del repo en GitHub
            echo "Sincronizando con GitHub..."
            if ! git fetch origin main; then
              echo "ERROR: No se pudo hacer fetch de GitHub. Verifica que ~/.ssh/github_deploy_key existe y tiene permisos."
              exit 1
            fi
            git reset --hard origin/main
            
            # 6. Instalar dependencias
            echo "Instalando dependencias..."
            if command -v npm &> /dev/null; then
              npm ci || npm install
            else
              echo "ERROR: npm no encontrado. Verifica la instalación de Node.js en el VPS."
              exit 1
            fi
            
            # 7. Configurar variables y compilar
            echo "Compilando aplicación..."
            echo "VITE_API_URL=${{ vars.VITE_API_URL }}" > .env
            npm run build --if-present
