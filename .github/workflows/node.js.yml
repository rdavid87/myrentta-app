# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
      env:
        VITE_API_URL: ${{ vars.VITE_API_URL }}
    - run: npm test --if-present

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Solo ejecutaremos el despliegue si estamos haciendo push a la rama main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }} # Por lo general es 22
          # Este script se ejecutará directamente en tu VPS remoto
          script: |
            # 1. Forzar carga de Node/NPM (importante para SSH)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" # Carga nvm si existe
            export PATH=$PATH:/usr/local/bin:/usr/bin # Rutas estándar
            
            # 2. Navega a la carpeta de tu proyecto
            cd /var/www/clients/client11/web16/web/myrentta-app
            
            # 3. Asegurar que confiamos en github.com
            mkdir -p ~/.ssh
            ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
            
            # 4. Si no es un repositorio git, inicialízalo
            if [ ! -d ".git" ]; then
              echo "Inicializando repositorio git..."
              git init
              git config core.sshCommand "ssh -i ~/.ssh/github_deploy_key -o IdentitiesOnly=yes"
              git remote add origin git@github.com:rdavid87/myrentta-app.git
            fi
            
            # 5. Sincronizar con GitHub usando la llave específica
            git fetch origin main
            git reset --hard origin/main
            
            # 6. Instalar dependencias
            # Usamos 'npm' directamente; si falla usa la ruta de 'which npm'
            npm ci || npm install
            
            # 7. Configurar variables y compilar
            echo "VITE_API_URL=${{ vars.VITE_API_URL }}" > .env
            npm run build --if-present
