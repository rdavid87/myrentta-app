# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
      env:
        VITE_API_URL: ${{ vars.VITE_API_URL }}
    - run: npm test --if-present

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies and Build
        run: |
          npm ci
          echo "VITE_API_URL=${{ vars.VITE_API_URL }}" > .env
          npm run build
          
      - name: Copy build files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          source: "dist/*"
          target: "/var/www/clients/client11/web16/web/myrentta-app"
          strip_components: 1

      - name: Notify Slack on Success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: 'good'
          SLACK_TITLE: '🚀 Despliegue Exitoso - MyRentta App'
          SLACK_MESSAGE: 'La aplicación ha sido desplegada correctamente en https://myrentta.com/myrentta-app/'
          SLACK_ICON: https://github.com/rtCamp.png?size=48
          SLACK_USERNAME: 'GitHub Actions'

      - name: Notify Slack on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: 'danger'
          SLACK_TITLE: '❌ Error en el Despliegue - MyRentta App'
          SLACK_MESSAGE: 'Hubo un error durante el despliegue de la aplicación. Revisa los logs en GitHub.'
          SLACK_ICON: https://github.com/rtCamp.png?size=48
          SLACK_USERNAME: 'GitHub Actions'
